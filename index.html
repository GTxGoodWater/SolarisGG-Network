<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SolarisGG Desktop</title>

<!-- Fuentes -->
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&family=Lilita+One&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: url('SolarisGGFondo.png');
    background-size: cover;
    background-position: center;
    font-family: "Lexend", sans-serif;
    overflow: hidden;
  }

  /* ICONOS DEL ESCRITORIO */
  .icons {
    position: absolute;
    top: 40px;
    left: 40px;
    display: flex;
    flex-direction: column;
    gap: 35px;
  }

  .icon {
    width: 90px;
    text-align: center;
    cursor: pointer;
  }

  .icon img {
    width: 64px;
    height: 64px;
    margin-bottom: 6px;
    transition: 0.2s;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }

  .icon:hover img {
    transform: scale(1.12);
  }

  .icon span {
    font-size: 14px;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.7);
  }

  /* BARRA DE TAREAS ESTILO WINDOWS 11 */
  .taskbar {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 70px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(14px);
    border-top: 1px solid rgba(255,255,255,0.4);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* ICONOS CENTRALES DE LA BARRA */
  .taskbar-icons {
    display: flex;
    gap: 35px;
  }

  .taskbar-icons img {
    width: 32px;
    height: 32px;
    cursor: pointer;
    transition: 0.2s;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  }

  .taskbar-icons img:hover {
    transform: scale(1.15);
  }

  /* TEXTO SOLARISGG A LA DERECHA */
  .taskbar-title {
    position: absolute;
    right: 25px;
    font-family: "Lilita One", cursive;
    font-size: 24px;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
  }
</style>
</head>
<body>

<!-- ICONOS DEL ESCRITORIO -->
<div class="icons">

  <!-- ICONO 1: SHOOTOUT -->
  <div class="icon" onclick="location.href='ShootOut.html'">
    <img src="https://cdn-icons-png.flaticon.com/512/32/32177.png">
    <span>ShootOut</span>
  </div>

  <!-- ICONO 2: GGCRAFT -->
  <div class="icon" onclick="location.href='GGCraft.html'">
    <img src="https://cdn-icons-png.flaticon.com/512/861/861060.png">
    <span>GGCraft</span>
  </div>

</div>

<!-- BARRA DE TAREAS -->
<div class="taskbar">

  <!-- ICONOS CENTRALES -->
  <div class="taskbar-icons">
    <img src="https://cdn-icons-png.flaticon.com/512/732/732221.png">
    <img src="https://cdn-icons-png.flaticon.com/512/732/732223.png">
    <img src="https://cdn-icons-png.flaticon.com/512/732/732228.png">
  </div>

  <!-- NOMBRE DEL SISTEMA -->
  <div class="taskbar-title">SolarisGG</div>
</div>

</body>
</html>
