<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SolarisGG Network</title>

<link rel="icon" type="image/png" href="SolarisGG-Logo.png?v=9999">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    font-family: "Lexend", sans-serif;
  }

  /* ===========================
     PANTALLA DE CARGA
     =========================== */
  #loading-screen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    animation: fadeOut 1s ease forwards;
    animation-delay: 3.5s;
  }

  #loading-logo {
    width: 200px;
    height: 200px;
    animation: logoAnim 3s ease;
  }

  @keyframes logoAnim {
    0% { opacity: 0; transform: scale(0.6); }
    50% { opacity: 1; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.05); }
  }

  #loading-bar {
    width: 300px;
    height: 18px;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    margin-top: 25px;
    overflow: hidden;
  }

  #loading-progress {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #00aaff, #00ffea);
    animation: loadAnim 3s ease forwards;
  }

  @keyframes loadAnim {
    0% { width: 0%; }
    100% { width: 100%; }
  }

  @keyframes fadeOut {
    0% { opacity: 1; }
    100% { opacity: 0; visibility: hidden; }
  }

  /* ===========================
     LOGIN
     =========================== */
  #login-screen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('SolarisGGFondo.png');
    background-size: cover;
    background-position: center;
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: transform 1s ease;
    z-index: 10;
  }

  #login-screen img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    margin-bottom: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
  }

  #login-screen h1 {
    font-size: 48px;
    color: white;
    text-shadow: 0 3px 8px rgba(0,0,0,0.6);
    margin-bottom: 30px;
    font-weight: 700;
  }

  #login-btn {
    padding: 14px 40px;
    font-size: 22px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.85);
    cursor: pointer;
    transition: 0.25s;
    font-weight: 600;
    font-family: "Lexend", sans-serif;
  }

  #login-btn:hover {
    background: white;
    transform: scale(1.05);
  }

  /* ===========================
     ESCRITORIO
     =========================== */
  #desktop {
    width: 100%;
    height: 100%;
    background: url('SolarisGGFondo.png');
    background-size: cover;
    background-position: center;
    position: absolute;
    top: 0;
    left: 0;
  }

  .icons {
    position: absolute;
    top: 40px;
    left: 40px;
    display: flex;
    flex-direction: column;
    gap: 35px;
  }

  .icon {
    width: 90px;
    text-align: center;
    cursor: pointer;
  }

  .icon img {
    width: 64px;
    height: 64px;
    margin-bottom: 6px;
    transition: 0.2s;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }

  .icon:hover img {
    transform: scale(1.12);
  }

  .icon span {
    font-size: 14px;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.7);
  }

  /* ===========================
     BARRA DE TAREAS
     =========================== */
  .taskbar {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 68px;
    background: rgba(30,30,30,0.85);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
  }

  #search-btn {
    position: absolute;
    left: 15px;
    cursor: pointer;
    width: 34px;
    height: 34px;
    transition: 0.2s;
  }

  #search-btn:hover {
    transform: scale(1.15);
  }

  /* ===========================
     MENÚ DE BÚSQUEDA
     =========================== */
  #search-menu {
    position: absolute;
    bottom: 90px;
    left: 10px;

    width: 320px;
    max-width: calc(100% - 20px);
    height: 440px;

    box-sizing: border-box;
    overflow-y: auto;
    overflow-x: hidden;

    background: rgba(30,30,30,0.85);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    padding: 16px;

    display: none;
    flex-direction: column;
  }

  #search-menu::-webkit-scrollbar {
    width: 6px;
  }

  #search-menu::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.25);
    border-radius: 10px;
  }

  @keyframes menuOpen {
    0% { transform: translateY(20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  @keyframes menuClose {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(20px); opacity: 0; }
  }

  #search-input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 15px;
    font-family: "Lexend", sans-serif;
    margin-bottom: 16px;
    box-sizing: border-box;
  }

  .search-section {
    color: white;
    font-size: 18px;
    font-weight: 600;
    margin: 10px 0 8px 2px;
    opacity: 0.9;
  }

  .search-item {
    padding: 12px;
    background: rgba(255,255,255,0.1);
    margin-bottom: 10px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .search-item:hover {
    background: rgba(255,255,255,0.2);
  }

  .search-icon {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    object-fit: cover;
  }

  #no-results {
    display: none;
    color: white;
    opacity: 0.8;
    margin-top: 10px;
    font-size: 16px;
    text-align: center;
  }

  /* ===========================
     FECHA + HORA
     =========================== */
  .taskbar-datetime {
    position: absolute;
    right: 200px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 17px;
    color: white;
    font-weight: 600;
  }

  .separator {
    opacity: 0.6;
  }

  /* Tooltip animado + más bajo */
  .taskbar-datetime:hover::after {
    content: attr(data-full);
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 50px; /* 🔥 más bajo aún */
    background: rgba(40,40,40,0.95);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 14px;
    white-space: nowrap;
    color: white;

    opacity: 0;
    animation: tooltipFade 0.25s ease forwards;
  }

  @keyframes tooltipFade {
    0% { opacity: 0; transform: translate(-50%, 10px); }
    100% { opacity: 1; transform: translate(-50%, 0); }
  }

  /* ===========================
     SOLARISGG + LOGO
     =========================== */
  .taskbar-title {
    position: absolute;
    right: 25px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 22px;
    color: white;
    font-weight: 700;
  }

  .taskbar-title img {
    width: 30px;
    height: 30px;
    border-radius: 6px;
  }
</style>

<script>
  function login() {
    document.getElementById("login-screen").style.transform = "translateY(-100%)";
  }

  function openSearchMenu() {
    const menu = document.getElementById("search-menu");
    menu.style.display = "flex";
    menu.style.animation = "menuOpen 0.25s ease forwards";
  }

  function closeSearchMenu() {
    const menu = document.getElementById("search-menu");
    if (menu.style.display === "flex") {
      menu.style.animation = "menuClose 0.25s ease forwards";
      setTimeout(() => {
        menu.style.display = "none";
      }, 230);
    }
  }

  function toggleSearch() {
    const menu = document.getElementById("search-menu");
    if (menu.style.display === "flex") {
      closeSearchMenu();
    } else {
      openSearchMenu();
    }
  }

  function filterGames() {
    let input = document.getElementById("search-input").value.toLowerCase();
    let items = document.getElementsByClassName("search-item");
    let visibleCount = 0;

    for (let i = 0; i < items.length; i++) {
      let text = items[i].innerText.toLowerCase();
      const visible = text.includes(input);
      items[i].style.display = visible ? "flex" : "none";
      if (visible) visibleCount++;
    }

    updateCategoryVisibility();

    document.getElementById("no-results").style.display =
      visibleCount === 0 ? "block" : "none";
  }

  function updateCategoryVisibility() {
    const sections = [
      { title: document.querySelector("h3.search-section:nth-of-type(1)"), list: document.getElementById("our-games") },
      { title: document.querySelector("h3.search-section:nth-of-type(2)"), list: document.getElementById("other-games") }
    ];

    sections.forEach(sec => {
      const visibleItems = Array.from(sec.list.children).filter(item => item.style.display !== "none");
      sec.title.style.display = visibleItems.length > 0 ? "block" : "none";
    });
  }

  document.addEventListener("click", function(e) {
    const menu = document.getElementById("search-menu");
    const btn = document.getElementById("search-btn");

    if (!menu.contains(e.target) && e.target !== btn) {
      closeSearchMenu();
    }
  });

  function updateDateTime() {
    const now = new Date();

    const day = String(now.getDate()).padStart(2, "0");
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const year = String(now.getFullYear()).slice(2);

    const hours = String(now.getHours()).padStart(2, "0");
    const minutes = String(now.getMinutes()).padStart(2, "0");

    const fullDate = now.toLocaleDateString("es-ES", {
      weekday: "long",
      year: "numeric",
      month: "long",
      day: "numeric"
    });

    document.getElementById("taskbar-date").textContent = `${day}/${month}/${year}`;
    document.getElementById("taskbar-time").textContent = `${hours}:${minutes}`;

    document.querySelector(".taskbar-datetime").setAttribute("data-full", fullDate);
  }

  setInterval(updateDateTime, 1000);
  updateDateTime();

  function sortSection(sectionId) {
    const section = document.getElementById(sectionId);
    const items = Array.from(section.children);

    items.sort((a, b) => {
      const nameA = a.innerText.toLowerCase();
      const nameB = b.innerText.toLowerCase();
      return nameA.localeCompare(nameB);
    });

    items.forEach(item => section.appendChild(item));
  }

  window.onload = () => {
    sortSection("our-games");
    sortSection("other-games");
  };
</script>

</head>
<body>

<div id="loading-screen">
  <img id="loading-logo" src="SolarisGG-Logo.png">
  <div id="loading-bar">
    <div id="loading-progress"></div>
  </div>
</div>

<div id="login-screen">
  <img src="SolarisGG-Logo.png">
  <h1>SolarisGG</h1>
  <button id="login-btn" onclick="login()">Iniciar sesión</button>
</div>

<div id="desktop">

  <div class="icons">
    <div class="icon" onclick="location.href='ShootOut.html'">
      <img src="arma.png">
      <span>ShootOut</span>
    </div>

    <div class="icon" onclick="location.href='GGCraft.html'">
      <img src="bloque.png">
      <span>GGCraft</span>
    </div>
  </div>

  <div id="search-menu">

    <input id="search-input" onkeyup="filterGames()" placeholder="Buscar juegos...">

    <h3 class="search-section">Nuestros Juegos</h3>
    <div id="our-games">

      <div class="search-item" onclick="location.href='GGCraft.html'">
        <img src="bloque.png" class="search-icon">
        <span>GGCraft</span>
      </div>

      <div class="search-item" onclick="location.href='ShootOut.html'">
        <img src="arma.png" class="search-icon">
        <span>ShootOut</span>
      </div>

    </div>

    <h3 class="search-section">Otros Juegos</h3>
    <div id="other-games">

      <div class="search-item" onclick="location.href='https://adsf1234-hacker.github.io/EaglercraftClients/eag1_9_4.html'">
        <img src="mesa.png" class="search-icon">
        <span>Eaglercraft</span>
      </div>

    </div>

    <p id="no-results">Su juego no está disponible.</p>

  </div>

  <div class="taskbar">

    <img id="search-btn" src="lupa.png" onclick="toggleSearch()">

    <div class="taskbar-datetime">
      <span id="taskbar-date">00/00/00</span>
      <span class="separator">|</span>
      <span id="taskbar-time">00:00</span>
      <span class="separator">|</span>
    </div>

    <div class="taskbar-title">
      <img src="SolarisGG-Logo.png">
      SolarisGG
    </div>

  </div>

</div>

</body>
</html>
