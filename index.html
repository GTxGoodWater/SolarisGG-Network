<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SolarisGG</title>

    <link rel="icon" type="image/png" href="SolarisGG-Logo.png">

    <style>
        body {
            margin: 0;
            background: #FFE48A;
        }

        .topbar {
            width: 100%;
            height: 60px;
            background: linear-gradient(90deg, #ffb347, #ff9a00);
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-left: 20px;
        }

        .topbar img {
            height: 45px;
        }

        /* CARRUSEL FADE */
        .carousel-container {
            width: 100%;
            height: 300px;
            position: relative;
            overflow: hidden;
        }

        .carousel-container img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .carousel-container img.active {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <img src="SolarisGGWeb.png" alt="SolarisGG Logo">
    </div>

    <!-- CARRUSEL FADE -->
    <div class="carousel-container">
        <img src="Image1C.png" class="active">
        <img src="Image2C.png">
        <img src="Image3C.png">
        <img src="Image4C.png">
        <img src="Image5C.png">
        <img src="Image6C.png">
        <img src="Image7C.png">
    </div>

    <script>
        const images = document.querySelectorAll(".carousel-container img");
        let index = 0;

        setInterval(() => {
            images[index].classList.remove("active");
            index = (index + 1) % images.length;
            images[index].classList.add("active");
        }, 5000);
    </script>

</body>
</html>
