<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SolarisGG</title>

    <!-- ICONO DE LA PESTAÑA -->
    <link rel="icon" type="image/png" href="SolarisGG-Logo.png">

    <style>
        body {
            margin: 0;
            background: #FFE48A; /* Fondo de toda la página */
        }

        .topbar {
            width: 100%;
            height: 60px;
            background: linear-gradient(90deg, #ffb347, #ff9a00);
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-left: 20px;
        }

        .topbar img {
            height: 45px;
        }

        /* CARRUSEL */
        .carousel-container {
            width: 100%;
            height: 300px;
            overflow: hidden;
            position: relative;
        }

        .carousel-track {
            display: flex;
            width: 500%;
            height: 100%;
            transition: transform 0.8s ease;
        }

        .carousel-track img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <img src="SolarisGGWeb.png" alt="SolarisGG Logo">
    </div>

    <!-- CARRUSEL -->
    <div class="carousel-container">
        <div class="carousel-track" id="track">
            <img src="Image1C.png" alt="Imagen 1">
            <img src="Image2C.png" alt="Imagen 2">
            <img src="Image3C.png" alt="Imagen 3">
            <img src="Image4C.png" alt="Imagen 4">
            <img src="Image5C.png" alt="Imagen 5">
        </div>
    </div>

    <script>
        let index = 0;
        const track = document.getElementById("track");

        setInterval(() => {
            index = (index + 1) % 5;
            track.style.transform = `translateX(-${index * 100}%)`;
        }, 5000);
    </script>

</body>
</html>
