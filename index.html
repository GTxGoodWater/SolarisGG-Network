<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SolarisGG</title>

    <link rel="icon" type="image/png" href="SolarisGG-Logo.png">

    <style>
        body {
            margin: 0;
            background: #FFE48A;
        }

        .topbar {
            width: 100%;
            height: 60px;
            background: linear-gradient(90deg, #ffb347, #ff9a00);
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-left: 20px;
        }

        .topbar img {
            height: 45px;
        }

        /* CARRUSEL */
        .carousel-container {
            width: 100%;
            height: 300px;
            overflow: hidden;
            position: relative;
        }

        .carousel-track {
            display: flex;
            height: 100%;
            transition: transform 0.8s ease;
        }

        .carousel-track img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <img src="SolarisGGWeb.png" alt="SolarisGG Logo">
    </div>

    <!-- CARRUSEL -->
    <div class="carousel-container">
        <div class="carousel-track" id="track">
            <img src="Image1C.png">
            <img src="Image2C.png">
            <img src="Image3C.png">
            <img src="Image4C.png">
            <img src="Image5C.png">
            <img src="Image6C.png">
            <img src="Image7C.png">

            <!-- DUPLICAMOS LA PRIMERA PARA UN LOOP PERFECTO -->
            <img src="Image1C.png">
        </div>
    </div>

    <script>
        const track = document.getElementById("track");
        const total = 8; // 7 + 1 duplicada
        let index = 0;

        setInterval(() => {
            index++;

            track.style.transform = `translateX(-${index * 100}%)`;

            // Cuando llega a la duplicada, reinicia sin que se note
            if (index === total - 1) {
                setTimeout(() => {
                    track.style.transition = "none";
                    track.style.transform = "translateX(0)";
                    index = 0;

                    // Reaplicar transición después de un frame
                    setTimeout(() => {
                        track.style.transition = "transform 0.8s ease";
                    }, 20);
                }, 800); // esperar a que termine la animación
            }

        }, 5000);
    </script>

</body>
</html>
