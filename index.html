<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SolarisGG Network</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="SolarisGG-Logo.png">

<!-- Fuente principal -->
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    font-family: "Lexend", sans-serif;
  }

  /* ===========================
     PANTALLA DE LOGIN
     =========================== */
  #login-screen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('SolarisGGFondo.png');
    background-size: cover;
    background-position: center;
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: transform 1s ease;
    z-index: 10;
  }

  #login-screen img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    margin-bottom: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
  }

  #login-screen h1 {
    font-size: 48px;
    color: white;
    text-shadow: 0 3px 8px rgba(0,0,0,0.6);
    margin-bottom: 30px;
    font-weight: 700;
  }

  #login-btn {
    padding: 14px 40px;
    font-size: 22px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.85);
    cursor: pointer;
    transition: 0.25s;
    font-weight: 600;
  }

  #login-btn:hover {
    background: white;
    transform: scale(1.05);
  }

  /* ===========================
     ESCRITORIO WINDOWS 11
     =========================== */
  #desktop {
    width: 100%;
    height: 100%;
    background: url('SolarisGGFondo.png');
    background-size: cover;
    background-position: center;
    position: absolute;
    top: 0;
    left: 0;
  }

  /* ICONOS */
  .icons {
    position: absolute;
    top: 40px;
    left: 40px;
    display: flex;
    flex-direction: column;
    gap: 35px;
  }

  .icon {
    width: 90px;
    text-align: center;
    cursor: pointer;
  }

  .icon img {
    width: 64px;
    height: 64px;
    margin-bottom: 6px;
    transition: 0.2s;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }

  .icon:hover img {
    transform: scale(1.12);
  }

  .icon span {
    font-size: 14px;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.7);
  }

  /* BARRA DE TAREAS */
  .taskbar {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 70px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(14px);
    border-top: 1px solid rgba(255,255,255,0.4);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .taskbar-icons {
    display: flex;
    gap: 35px;
  }

  .taskbar-icons img {
    width: 32px;
    height: 32px;
    cursor: pointer;
    transition: 0.2s;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  }

  .taskbar-icons img:hover {
    transform: scale(1.15);
  }

  .taskbar-title {
    position: absolute;
    right: 25px;
    font-size: 24px;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    font-weight: 700;
  }
</style>

<script>
  function login() {
    document.getElementById("login-screen").style.transform = "translateY(-100%)";
  }
</script>

</head>
<body>

<!-- ===========================
     LOGIN SCREEN
     =========================== -->
<div id="login-screen">
  <img src="SolarisGG-Logo.png">
  <h1>SolarisGG</h1>
  <button id="login-btn" onclick="login()">Login</button>
</div>

<!-- ===========================
     ESCRITORIO
     =========================== -->
<div id="desktop">

  <!-- ICONOS -->
  <div class="icons">

    <div class="icon" onclick="location.href='ShootOut.html'">
      <img src="arma.png">
      <span>ShootOut</span>
    </div>

    <div class="icon" onclick="location.href='GGCraft.html'">
      <img src="bloque.png">
      <span>GGCraft</span>
    </div>

  </div>

  <!-- BARRA DE TAREAS -->
  <div class="taskbar">
    <div class="taskbar-icons">
      <img src="https://cdn-icons-png.flaticon.com/512/732/732221.png">
      <img src="https://cdn-icons-png.flaticon.com/512/732/732223.png">
      <img src="https://cdn-icons-png.flaticon.com/512/732/732228.png">
    </div>

    <div class="taskbar-title">SolarisGG</div>
  </div>

</div>

</body>
</html>
