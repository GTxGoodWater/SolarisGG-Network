<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SolarisGG</title>

    <!-- ICONO DE LA PESTAÑA -->
    <link rel="icon" type="image/png" href="SolarisGG-Logo.png">

    <style>
        body {
            margin: 0;
            background: #FFE48A;
        }

        .topbar {
            width: 100%;
            height: 60px;
            background: linear-gradient(90deg, #ffb347, #ff9a00);
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-left: 20px;
        }

        .topbar img {
            height: 45px;
        }

        /* CARRUSEL */
        .carousel-container {
            width: 100%;
            height: 300px;
            overflow: hidden;
            position: relative;
        }

        .carousel-track {
            display: flex;
            height: 100%;
            transition: transform 0.8s ease;
        }

        .carousel-track img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <img src="SolarisGGweb.png" alt="SolarisGG Logo">
    </div>

    <!-- CARRUSEL -->
    <div class="carousel-container">
        <div class="carousel-track" id="track">
            <img src="Image1C.png">
            <img src="Image2C.png">
            <img src="Image3C.png">
            <img src="Image4C.png">
            <img src="Image5C.png">
        </div>
    </div>

    <script>
        const track = document.getElementById("track");
        const total = 5; // número de imágenes
        let index = 0;

        setInterval(() => {
            index++;

            if (index === total) {
                // Reinicio suave sin salto
                track.style.transition = "none";
                track.style.transform = "translateX(0)";
                index = 1;

                // Reaplicar transición después de un frame
                setTimeout(() => {
                    track.style.transition = "transform 0.8s ease";
                    track.style.transform = `translateX(-${index * 100}%)`;
                }, 20);
            } else {
                track.style.transform = `translateX(-${index * 100}%)`;
            }

        }, 5000); // 5 segundos
    </script>

</body>
</html>
